id: typography-anatomy-basic
dimensions:
  - id: hierarchy
    label: "Визуальная иерархия"
    weight: 0.25
    levels:
      "1": "Нет явного порядка; элементы конкурируют за внимание."
      "3": "Иерархия читается, но 1–2 акцента спорные."
      "5": "Чёткая иерархия через размер, вес и пространство; глаз ведётся по странице."
  - id: alignment
    label: "Выравнивание и сетка"
    weight: 0.20
    levels:
      "1": "Элементы плавают по холсту; сетка не прослеживается."
      "3": "Основные блоки выровнены, но есть локальные нарушения."
      "5": "Все элементы встают на сетку; оптические корректировки читаются."
  - id: typography
    label: "Типографика"
    weight: 0.20
    levels:
      "1": "Случайный выбор шрифтов; пары не согласованы."
      "3": "Пара читается, но модульная шкала неровная."
      "5": "Осмысленный выбор пары, чистая модульная шкала, уважение к мере чтения."
  - id: color_contrast
    label: "Цвет и контраст"
    weight: 0.15
    levels:
      "1": "Конфликтующие цвета; контраст ниже WCAG AA."
      "3": "Палитра логична, но контраст на границе AA в 1–2 местах."
      "5": "Осмысленная палитра 60/30/10; весь текст проходит WCAG AA/AAA."
  - id: ux_clarity
    label: "Ясность UX"
    weight: 0.20
    levels:
      "1": "Непонятно, что делать дальше; нет единого CTA."
      "3": "Основной путь понятен, вторичные действия размытые."
      "5": "Единственный первичный CTA; вторичные действия ясно ранжированы."
reference_examples:
  - url: "/assets/rubric/typography-anatomy-5.png"
    score: 5
    notes: "Чистая модульная шкала (1.414), единственный primary CTA, идеальное выравнивание по baseline 8px."
  - url: "/assets/rubric/typography-anatomy-3.png"
    score: 3
    notes: "Иерархия читается, но два соседних заголовка почти одного размера — глаз спотыкается на выборе."
  - url: "/assets/rubric/typography-anatomy-1.png"
    score: 1
    notes: "Три конкурирующих акцента на первом экране; CTA теряется среди вторичных ссылок."
