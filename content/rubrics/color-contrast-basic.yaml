id: color-contrast-basic
dimensions:
  - id: contrast_pass
    label: "Контраст и читаемость"
    weight: 0.35
    levels:
      "1": "Контраст не проходит ни WCAG AA, ни APCA Lc 45 — текст не читается без усилий."
      "3": "WCAG AA проходит в основных местах, но APCA Lc 60 не достигается — тело текста на границе."
      "5": "WCAG AA/AAA и APCA Lc ≥ 75 для тела; крупный текст с Lc ≥ 60. Палитра проходит оба теста."
  - id: harmony
    label: "Цветовая гармония"
    weight: 0.25
    levels:
      "1": "Цвета конфликтуют, сочетание не подчиняется ни одной гармонии — палитра случайная."
      "3": "Гармония угадывается (аналогичная, комплементарная или монохромная), но 1–2 цвета выбиваются из системы."
      "5": "Чёткая гармония из классического набора, выдержанная насыщенность и светлота; палитра читается как единая система."
  - id: accessibility_semantics
    label: "Семантика и доступность"
    weight: 0.20
    levels:
      "1": "Цвет — единственный носитель информации; нет подписей, иконок или других сигналов помимо hue."
      "3": "Семантические цвета (error/success/warning) присутствуют, но конфликтуют с brand-палитрой."
      "5": "Иерархия читается в grayscale; semantic-цвета отделены от brand и не дублируют его; дальтоники видят различия через форму, текст или расположение."
  - id: aesthetics
    label: "Эстетика и уместность"
    weight: 0.20
    levels:
      "1": "Палитра не соответствует контексту продукта — игрушечные цвета в финансовом интерфейсе, агрессивные цвета в спокойном контенте."
      "3": "Палитра уместна, но выбрана по умолчанию (default Tailwind, стандартный Material) — ей не хватает характера."
      "5": "Палитра строит настроение продукта, выдерживает правило 60/30/10, акцент работает точечно — не более 10% площади."
reference_examples:
  - url: "/assets/rubric/color-contrast-5.png"
    score: 5
    notes: "Палитра в OKLCH: тёплый нейтральный paper + ink, cinnabar-акцент только на primary CTA (меньше 6% площади), все пары проходят APCA Lc ≥ 75."
  - url: "/assets/rubric/color-contrast-3.png"
    score: 3
    notes: "Комплементарная пара работает, но secondary-текст на фоне с Lc ≈ 55 — читается, но на границе. Semantic error-цвет визуально близок к brand-акценту."
  - url: "/assets/rubric/color-contrast-1.png"
    score: 1
    notes: "Насыщенные цвета друг на друге (синий текст на красном фоне), WCAG 2.1:1, APCA Lc 18. Без опоры на форму — дальтоник не увидит разницы."
